<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет студентов | Система управления группой</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Система учета студентов группы</h1>
            <p>Управление студентами | Обеспечение качества функционирования компьютерных систем</p>
        </header>

        <div class="main-content">
            <!-- Форма добавления студента -->
            <div class="card">
                <h2>➕ Добавить студента</h2>
                <form id="studentForm">
                    <div class="form-group">
                        <label>Фамилия:</label>
                        <input type="text" id="lastName" required placeholder="Иванов">
                    </div>
                    <div class="form-group">
                        <label>Имя:</label>
                        <input type="text" id="firstName" required placeholder="Иван">
                    </div>
                    <div class="form-group">
                        <label>Возраст:</label>
                        <input type="number" id="age" required min="17" max="60" placeholder="20">
                    </div>
                    <div class="form-group">
                        <label>Средний балл:</label>
                        <input type="number" id="gpa" step="0.01" min="0" max="5" required placeholder="4.5">
                    </div>
                    <button type="submit" class="btn btn-primary">Добавить студента</button>
                </form>
            </div>

            <!-- Поиск студента -->
            <div class="card">
                <h2>🔍 Поиск студента</h2>
                <div class="form-group">
                    <label>Поиск по фамилии:</label>
                    <input type="text" id="searchInput" placeholder="Введите фамилию...">
                </div>
                <button id="searchBtn" class="btn btn-secondary">Найти</button>
                <button id="clearSearchBtn" class="btn btn-danger">Показать всех</button>
                <div id="searchResult"></div>
            </div>

            <!-- Список студентов -->
            <div class="card">
                <h2>📋 Список студентов</h2>
                <div id="stats" class="stats"></div>
                <div id="studentList" class="student-list"></div>
            </div>
        </div>

        <footer>
            <p>© 2024 | Система учета студентов | Курсовая работа по ОКФКС</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
